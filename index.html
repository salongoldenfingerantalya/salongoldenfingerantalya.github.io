<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Golden Fingers</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* İstediğin o harika saç kesim arka planı */
            background-image: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), url('https://images.unsplash.com/photo-1595425970377-c9703cf48b6d?q=80&w=1200&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 440px;
            text-align: center;
            padding: 10px;
        }
        /* Üst sıra yerleşimi (Tırnak - Kelebekli Yeni Logo - Saç) */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }
        .side-circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            border: 2px solid #d4af37;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        /* Sol üstteki protez tırnak görseli */
        .nail-img {
            background-image: url('https://images.unsplash.com/photo-1604654894610-df4906947712?q=80&w=400&auto=format&fit=crop');
        }
        /* Sağ üstteki saç kesim görseli */
        .hair-img {
            background-image: url('https://images.unsplash.com/photo-1562322140-8baeececf3df?q=80&w=400&auto=format&fit=crop');
        }
        /* ORTAKİ ANA LOGO: Tam senin istediğin o yüz ve kelebek olan fotoğraf yerleştirildi */
        .center-logo {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            background-image: url('https://i.hizliresim.com/g0feh70.jpg');
            background-size: cover;
            background-position: center;
            border: 2px solid #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }
        /* Belirgin ve net kullanıcı adı */
        .username {
            font-size: 15px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.9);
        }
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        /* İstediğin o ince altın çerçeveli şık buton yapısı */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            color: #ffffff;
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 15px;
            border: 1px solid #d4af37;
            transition: all 0.2s ease;
        }
        .btn:active {
            transform: scale(0.98);
            background: rgba(212, 175, 55, 0.15);
        }
        .btn-icon {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            object-fit: contain;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-row">
        <div class="side-circle nail-img"></div>
        <div class="center-logo"></div>
        <div class="side-circle hair-img"></div>
    </div>
    
    <div class="username">@salongoldenfingerantalya</div>

    <div class="links-wrapper">
        <a href="https://wa.me/905331350742" target="_blank" class="btn">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" class="btn-icon" alt="WhatsApp">
            WhatsApp
        </a>
        <a href="https://instagram.com/salongoldenfingerantalya" target="_blank" class="btn">
            <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" class="btn-icon" alt="Instagram">
            Instagram
        </a>
        <a href="https://www.facebook.com/people/Salon-Golden-Fingers/61553316961194/" target="_blank" class="btn">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" class="btn-icon" alt="Facebook">
            Facebook
        </a>
        <a href="tel:+905331350742" class="btn">
            <img src="https://cdn-icons-png.flaticon.com/512/597/597177.png" class="btn-icon" alt="Phone">
            Telefon Et
        </a>
        <a href="https://maps.google.com/?q=Salon+Golden+Fingers+Antalya" target="_blank" class="btn">
            <img src="https://cdn-icons-png.flaticon.com/512/854/854878.png" class="btn-icon" alt="Location">
            Konum / Adres
        </a>
    </div>
</div>

</body>
</html>
