<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Finger's Salon</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Altın işlemeli protez tırnak arka planı */
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('https://images.unsplash.com/photo-1604654894610-df4906947712?q=80&w=1200&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            padding: 10px;
        }
        /* Üst Başlık Yazısı */
        .main-title {
            font-size: 26px;
            font-weight: 500;
            font-family: 'Georgia', serif;
            letter-spacing: 1px;
            margin-bottom: 25px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }
        /* Yuvarlakların hizalandığı satır */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            position: relative;
        }
        /* Yanlardaki Büyük Yuvarlaklar */
        .side-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            border: 2.5px solid #b89742;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        /* Sol üstteki kısa saç kesim modeli */
        .left-hair {
            background-image: url('https://images.unsplash.com/photo-1605497746444-ac9da4501a61?q=80&w=400&auto=format&fit=crop');
        }
        /* Sağ üstteki makaslı saç kesim görseli */
        .right-hair {
            background-image: url('https://images.unsplash.com/photo-1595425970377-c9703cf48b6d?q=80&w=400&auto=format&fit=crop');
        }
        /* Ortadaki küçük kelebekli logo */
        .center-logo {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background-image: url('https://i.hizliresim.com/g0feh70.jpg');
            background-size: cover;
            background-position: center;
            border: 2px solid #b89742;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.6);
        }
        /* Kullanıcı adı yazısı */
        .username {
            font-size: 14px;
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 25px;
            letter-spacing: 0.3px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.9);
        }
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        /* Koyu, ince altın çerçeveli şık butonlar */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background: rgba(18, 18, 18, 0.75);
            color: #ffffff;
            text-decoration: none;
            padding: 13px 20px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 15px;
            border: 1px solid #b89742;
            transition: all 0.2s ease;
        }
        .btn:active {
            transform: scale(0.98);
            background: rgba(18, 18, 18, 0.9);
        }
        .btn-icon {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            object-fit: contain;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="main-title">GOLDEN FINGER'S<br>SALON</h1>

    <div class="header-row">
        <div class="side-circle left-hair"></div>
        <div class="center-logo"></div>
        <div class="side-circle right-hair"></div>
    </div>
    
    <div class="username">@salongoldenfingerantalya</div>

    <div class="links-wrapper">
        <a href="https://wa.me/905331350742" target="_blank" class="btn">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" class="btn-icon" alt="WhatsApp">
            WhatsApp
        </a>
        <a href="https://instagram.com/salongoldenfingerantalya" target="_blank" class="btn">
            <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" class="btn-icon" alt="Instagram">
            Instagram
        </a>
        <a href="https://www.facebook.com/people/Salon-Golden-Fingers/61553316961194/" target="_blank" class="btn">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" class="btn-icon" alt="Facebook">
            Facebook
        </a>
        <a href="tel:+905331350742" class="btn">
            <img src="https://cdn-icons-png.flaticon.com/512/597/597177.png" class="btn-icon" alt="Phone">
            Call Us
        </a>
        <a href="http://maps.google.com/?q=Salon+Golden+Fingers+Antalya" target="_blank" class="btn">
            <img src="https://cdn-icons-png.flaticon.com/512/854/854878.png" class="btn-icon" alt="Location">
            Location / Address
        </a>
    </div>
</div>

</body>
</html>
