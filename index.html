<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Golden Fingers Antalya</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1560066984-138dadb4c035?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 30px 20px;
            border-radius: 15px;
            backdrop-filter: blur(3px);
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .side-profile {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #ffffff;
            background-size: cover;
            background-position: center;
        }
        /* Sol tarafa saç görseli */
        .sac-img {
            background-image: url('https://images.unsplash.com/photo-1562322140-8baeececf3df?q=80&w=400&auto=format&fit=crop');
        }
        /* Sağ tarafa tırnak görseli */
        .tirnak-img {
            background-image: url('https://images.unsplash.com/photo-1604654894610-df4906947712?q=80&w=400&auto=format&fit=crop');
        }
        .center-logo {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background-color: #000000;
            border: 2px solid #d4af37;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
        }
        .username {
            color: #ffffff;
            font-size: 15px;
            margin-top: -10px;
            margin-bottom: 25px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            display: flex;
            align-items: center;
            width: 100%;
            background: #f8f9fa;
            color: #000000;
            text-decoration: none;
            padding: 14px 18px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:active {
            transform: scale(0.98);
            background: #e2e6ea;
        }
        .btn img {
            width: 28px;
            height: 28px;
            margin-right: 15px;
            object-fit: contain;
        }
        .btn span {
            flex-grow: 1;
            text-align: center;
            margin-right: 28px; /* İkonu ortalamak için dengeleme */
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-row">
        <div class="side-profile sac-img"></div>
        <div class="center-logo">👑</div>
        <div class="side-profile tirnak-img"></div>
    </div>
    
    <div class="username">@salongoldenfingerantalya</div>

    <div class="links-wrapper">
        <a href="https://wa.me/905331350742" target="_blank" class="btn">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="Whatsapp">
            <span>My Whatsapp</span>
        </a>

        <a href="https://instagram.com/salongoldenfingerantalya" target="_blank" class="btn">
            <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" alt="Instagram">
            <span>My Instagram</span>
        </a>

        <a href="https://www.facebook.com/people/Salon-Golden-Fingers/61553316961194/" target="_blank" class="btn">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
            <span>My Facebook</span>
        </a>

        <a href="tel:+905331350742" class="btn">
            <img src="https://cdn-icons-png.flaticon.com/512/597/597177.png" alt="Phone">
            <span>My Number</span>
        </a>

        <a href="https://maps.google.com/?q=Çağlayan+mah.Barınaklar+blv.+Çiftçi+Apt.No+121/A+Muratpaşa+/+Antalya" target="_blank" class="btn">
            <img src="https://cdn-icons-png.flaticon.com/512/854/854878.png" alt="Location">
            <span>Location</span>
        </a>
    </div>
</div>

</body>
</html>
